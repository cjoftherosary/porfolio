<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cjoftherosary — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --maroon:    #1A0005;
      --crimson:   #8B0000;
      --tan:       #C89A6A;
      --caramel:   #9B6A42;
      --bark:      #6B4423;
      --cream:     #F5E8CC;
      --text-main: #F0DDB8;
      --text-dim:  #C4A882;
      --radius:    12px;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--maroon);
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== NAV ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26,0,5,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(139,0,0,0.3);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 58px;
    }

    .nav-left { display: flex; align-items: center; gap: 0.8rem; }

    .nav-avatar {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--crimson); border: 1px solid var(--caramel);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: var(--tan); font-weight: 500; overflow: hidden;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; }

    .nav-links a {
      font-size: 0.88rem; font-weight: 400;
      color: var(--text-dim); text-decoration: none;
      transition: color 0.2s; padding-bottom: 2px;
    }

    .nav-links a:hover { color: var(--tan); border-bottom: 1.5px solid var(--tan); }

    .nav-handle {
      font-size: 0.82rem; color: var(--tan);
      border: 1px solid var(--caramel);
      border-radius: 100px; padding: 0.3rem 0.9rem; font-weight: 500;
    }

    /* ===== HERO ===== */
    .hero-banner {
      margin: 1.2rem 5vw;
      border-radius: 18px;
      background: linear-gradient(120deg, var(--bark) 0%, #3D1200 40%, #1A0005 100%);
      border: 1px solid rgba(139,0,0,0.4);
      min-height: 300px;
      display: flex; align-items: flex-end;
      position: relative; overflow: hidden;
    }

    .hero-banner::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 50% 80% at 70% 50%, rgba(139,0,0,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 30% 60% at 20% 80%, rgba(200,154,106,0.12) 0%, transparent 60%);
    }

    .hero-banner::after {
      content: '🍂'; position: absolute; top: 1.2rem; right: 1.8rem;
      font-size: 2.5rem; opacity: 0.18;
    }

    .hero-photo-slot {
      position: absolute; right: 6%; bottom: 0;
      width: 220px; height: 290px;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .hero-photo-placeholder {
      width: 100%; height: 100%;
      background: rgba(200,154,106,0.08);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      color: rgba(200,154,106,0.25);
    }

    .hero-content {
      position: relative; z-index: 10;
      padding: 0 4rem 2rem;
      max-width: 550px;
    }

    .hero-content h1 {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 0.8rem;
      color: var(--cream);
    }

    .hero-content p {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    /* ===== PORTFOLIO GRID ===== */
    .portfolio-section {
      padding: 3rem 5vw;
    }

    .section-header {
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    .section-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .filter-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.6rem 1.2rem;
      border: 1px solid rgba(200,154,106,0.3);
      background: transparent;
      color: var(--text-dim);
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--sans);
    }

    .filter-btn:hover {
      border-color: rgba(200,154,106,0.6);
      color: var(--tan);
    }

    .filter-btn.active {
      background: var(--crimson);
      color: var(--cream);
      border-color: var(--crimson);
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    .portfolio-card {
      background: rgba(107,68,35,0.15);
      border: 1px solid rgba(200,154,106,0.15);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }

    .portfolio-card:hover {
      border-color: rgba(200,154,106,0.4);
      background: rgba(107,68,35,0.25);
      transform: translateY(-4px);
    }

    .portfolio-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, rgba(139,0,0,0.2), rgba(200,154,106,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(200,154,106,0.25);
      overflow: hidden;
    }

    .portfolio-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .portfolio-content {
      padding: 1.5rem;
    }

    .portfolio-cat {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--tan);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }

    .portfolio-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: 0.8rem;
      line-height: 1.3;
    }

    .portfolio-text {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .portfolio-date {
      font-size: 0.75rem;
      color: var(--text-dim);
      opacity: 0.8;
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--maroon);
      border: 1px solid rgba(200,154,106,0.25);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-close {
      float: right;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text-dim);
      background: none;
      border: none;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--tan);
    }

    .modal-header {
      margin-bottom: 1.5rem;
    }

    .modal-cat {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--tan);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }

    .modal-title {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .modal-meta {
      font-size: 0.85rem;
      color: var(--text-dim);
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .modal-body {
      margin: 2rem 0;
      color: var(--text-main);
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .modal-body p {
      margin-bottom: 1rem;
    }

    .modal-skills {
      margin: 1.5rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .skill-tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: rgba(200,154,106,0.15);
      border: 1px solid rgba(200,154,106,0.3);
      border-radius: 100px;
      color: var(--tan);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .modal-btn {
      flex: 1;
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.2s;
    }

    .modal-btn-primary {
      background: var(--crimson);
      color: var(--cream);
    }

    .modal-btn-primary:hover {
      background: #6d0000;
    }

    .modal-btn-secondary {
      background: rgba(139,0,0,0.2);
      color: var(--tan);
      border: 1px solid rgba(200,154,106,0.3);
    }

    .modal-btn-secondary:hover {
      background: rgba(139,0,0,0.35);
      border-color: rgba(200,154,106,0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero-content {
        padding: 0 2rem 1.5rem;
      }

      .hero-content h1 {
        font-size: 2rem;
      }

      .hero-photo-slot {
        width: 150px;
        height: 200px;
        right: 2%;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        padding: 1.5rem;
      }

      .modal-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav>
    <div class="nav-left">
      <div class="nav-avatar">CJ</div>
      <ul class="nav-links">
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </div>
    <span class="nav-handle">@cjoftherosary</span>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero-banner">
    <div class="hero-photo-slot">
      <div class="hero-photo-placeholder">📷</div>
    </div>
    <div class="hero-content">
      <h1>Hello, I'm CJ</h1>
      <p>Faith-centered journalist, writer, and creative professional. Exploring the intersection of storytelling, spirituality, and culture.</p>
    </div>
  </section>

  <!-- ===== PORTFOLIO ===== -->
  <section id="portfolio" class="portfolio-section">
    <div class="section-header">
      <h2 class="section-title">Portfolio</h2>
      <p class="section-subtitle">Selected work across articles, design, and projects</p>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="articles">Articles</button>
      <button class="filter-btn" data-filter="pubmats">Pubmats</button>
      <button class="filter-btn" data-filter="projects">Projects</button>
      <button class="filter-btn" data-filter="excel">Excel & Data</button>
    </div>

    <div id="portfolioGrid" class="portfolio-grid"></div>
  </section>

  <!-- ===== MODAL ===== -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-header">
        <div class="modal-cat" id="modalCat"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <span id="modalDate"></span>
          <span id="modalCategory"></span>
        </div>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-skills" id="modalSkills"></div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Close</button>
        <a id="modalLink" href="#" class="modal-btn modal-btn-primary" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">Open ↗</a>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    const STORAGE_KEY = 'portfolio_entries';

    // ===== HARDCODED ENTRIES =====
    const hardcodedEntries = [
      {
        id: 'hc-guadalupe',
        cat: 'articles',
        title: 'The National Shrine of Our Lady of Guadalupe',
        category: 'Feature Article',
        date: 'December 2025',
        image: 'images/guadalupe.jpg',
        preview: 'Feature article covering the parish\'s 74th anniversary and the Solemnity of Christ the King.',
        content: '<p>The National Shrine of Our Lady of Guadalupe celebrated its 74th anniversary alongside the centenary Eucharistic celebration of the Solemnity of Christ the King.</p><p>This feature explores the atmosphere inside the parish and reflects on the role of faith in contemporary Filipino society.</p>',
        skills: 'Feature Writing,Reporting,Interviewing',
        link: '#',
        linkText: 'Read Article'
      }
    ];

    let allEntries = [];
    let currentFilter = 'all';

    // ===== LOAD ENTRIES =====
    function loadEntries() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        const adminEntries = stored ? JSON.parse(stored) : [];
        allEntries = [...hardcodedEntries, ...adminEntries];
      } catch (e) {
        console.error('Failed to load entries:', e);
        allEntries = [...hardcodedEntries];
      }
      renderPortfolio();
    }

    // ===== RENDER PORTFOLIO =====
    function renderPortfolio() {
      const grid = document.getElementById('portfolioGrid');
      const filtered = allEntries.filter(entry => 
        currentFilter === 'all' || entry.cat === currentFilter
      );

      if (filtered.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: var(--text-dim); padding: 2rem;">No entries yet in this category.</p>';
        return;
      }

      grid.innerHTML = filtered.map(entry => `
        <div class="portfolio-card" onclick="openModal('${entry.id}')">
          <div class="portfolio-image">
            ${entry.image ? `<img src="${escapeHtml(entry.image)}" alt="${escapeHtml(entry.title)}">` : '📄'}
          </div>
          <div class="portfolio-content">
            <div class="portfolio-cat">${escapeHtml(entry.cat)}</div>
            <div class="portfolio-title">${escapeHtml(entry.title)}</div>
            <div class="portfolio-text">${escapeHtml(entry.preview)}</div>
            <div class="portfolio-date">${escapeHtml(entry.date)}</div>
          </div>
        </div>
      `).join('');
    }

    // ===== MODAL =====
    function openModal(entryId) {
      const entry = allEntries.find(e => e.id === entryId);
      if (!entry) return;

      document.getElementById('modalCat').textContent = entry.cat.toUpperCase();
      document.getElementById('modalTitle').textContent = entry.title;
      document.getElementById('modalDate').textContent = entry.date;
      document.getElementById('modalCategory').textContent = entry.category;
      document.getElementById('modalBody').innerHTML = entry.content;

      const modalLink = document.getElementById('modalLink');
      if (entry.link && entry.link !== '#') {
        modalLink.href = entry.link;
        modalLink.style.display = 'flex';
        modalLink.textContent = (entry.linkText || 'Open') + ' ↗';
      } else {
        modalLink.style.display = 'none';
      }

      const skillsDiv = document.getElementById('modalSkills');
      if (entry.skills) {
        const skills = entry.skills.split(',').map(s => s.trim());
        skillsDiv.innerHTML = skills.map(skill => 
          `<span class="skill-tag">${escapeHtml(skill)}</span>`
        ).join('');
      } else {
        skillsDiv.innerHTML = '';
      }

      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    // ===== FILTERS =====
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderPortfolio();
      });
    });

    // ===== UTILITY =====
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // ===== INIT =====
    loadEntries();

    // Reload entries when localStorage changes (from admin.html)
    window.addEventListener('storage', loadEntries);
  </script>

</body>
</html>
